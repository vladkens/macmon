name: check

on:
  pull_request:
    paths:
      - .github/workflows/*.yml
      - Cargo.toml
      - Cargo.lock
      - crates/**

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/

      - run: rustup update --no-self-update stable && rustup default stable
      - run: cargo fmt --check
      - run: cargo check --workspace --release --locked
      - run: cargo test --workspace --locked

      - run: cargo build --workspace --release --locked
      - run: |
          cp target/release/macmon macmon
          tar czf macmon-pr-${{ github.event.pull_request.number }}.tar.gz readme.md LICENSE macmon
          ls -lah | grep macmon
        id: archive

      - uses: actions/upload-artifact@v4
        with:
          name: macmon-pr-${{ github.event.pull_request.number }}.tar.gz
          path: macmon-pr-${{ github.event.pull_request.number }}.tar.gz
          retention-days: 7
